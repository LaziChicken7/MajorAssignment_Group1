server:
  port: 8080
  servlet:
    context-path: /auction

spring:
  datasource:
    # Chú ý phần URL đã được thêm tham số createDatabaseIfNotExist=true
    url: jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:AuctionBidSystemTest}?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&autoReconnect=true
    username: ${MYSQLUSER:root}
    password: ${MYSQLPASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: always

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true

  # ... (các cấu hình bên dưới giữ nguyên)

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  jackson:
    time-zone: Asia/Ho_Chi_Minh

# ==========================================
# CẤU HÌNH HỆ THỐNG LOGGING CHUYÊN NGHIỆP
# ==========================================
logging:
  level:
    root: INFO
    org.auctionfx.auctionbidsystemspringbootrework: DEBUG
    org.hibernate.orm.persistenceContext: ERROR

  file:
    name: logs/auction-server.log

  logback:
    rollingpolicy:
      file-name-pattern: "logs/archived/auction-server-%d{yyyy-MM-dd}.%i.log"
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 1GB

  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%-5level) %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} : %msg%n"
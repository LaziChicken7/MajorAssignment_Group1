server:
  port: 8080
  servlet:
    context-path: /auction

spring:
  datasource:
    url: "${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/AuctionBidSystemTest?createDatabaseIfNotExist=true}"
    username: "${SPRING_DATASOURCE_USERNAME:root}"
    password: "${SPRING_DATASOURCE_PASSWORD:root}"
    driver-class-name: com.mysql.cj.jdbc.Driver # <-- BỔ SUNG DÒNG NÀY: Khai báo rõ dùng Driver MySQL

  sql:
    init:
      mode: never

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect # <-- BỔ SUNG DÒNG NÀY: Khai báo rõ dùng ngôn ngữ MySQL
    hibernate:
      ddl-auto: none
    show-sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  jackson:
    time-zone: Asia/Ho_Chi_Minh

# ==========================================
# CẤU HÌNH HỆ THỐNG LOGGING CHUYÊN NGHIỆP
# ==========================================
logging:
  level:
    root: INFO
    org.auctionfx.auctionbidsystemspringbootrework: DEBUG
    org.hibernate.orm.persistenceContext: ERROR

  file:
    name: logs/auction-server.log

  logback:
    rollingpolicy:
      file-name-pattern: "logs/archived/auction-server-%d{yyyy-MM-dd}.%i.log"
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 1GB

  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%-5level) %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} : %msg%n"
name: Build Windows EXEs and Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Setup Java 21 LTS
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: 3. Build & Package Spring Boot (Auction Bid Server)
        working-directory: AuctionBidSystemSpringBootRework
        run: |
          Write-Host "=== DANG BUILD SERVER BANG MAVEN ==="
          mvn clean package -DskipTests
          
          # Bắt lỗi Maven
          if ($LASTEXITCODE -ne 0) { 
              Write-Error "Loi: Maven khong the build Server. Vui long xem log cua Maven phia tren!"
              exit $LASTEXITCODE 
          }
          
          Write-Host "=== DANH SACH FILE TRONG THU MUC TARGET (SERVER) ==="
          Get-ChildItem -Path target
          
          New-Item -ItemType Directory -Force -Path build_exe
          
          # Tìm file .jar hoặc .war (loại trừ các file dư thừa)
          $appFile = Get-ChildItem -Path target | Where-Object { ($_.Extension -eq ".jar" -or $_.Extension -eq ".war") -and $_.Name -notmatch "plain" -and $_.Name -notmatch "original" } | Select-Object -First 1
          
          if ($null -eq $appFile) {
              Write-Error "Khong tim thay bat ky file .jar hay .war nao trong thu muc target!"
              exit 1
          }
          
          Write-Host "Da tim thay file: $($appFile.FullName)"
          Copy-Item -Path $appFile.FullName -Destination "build_exe\server.jar"
          
          # ĐÓNG GÓI BẢN 1.0.0
          jpackage --type app-image --dest output --name "Auction Bid Server" --app-version 1.0.0 --input build_exe --main-jar server.jar --win-console
          
          # TẠO SCRIPT CHẠY NHANH
          $batContent = "@echo off`r`n`"Auction Bid Server.exe`"`r`npause"
          Set-Content -Path "output\Auction Bid Server\Run-Debug.bat" -Value $batContent -Encoding ASCII
          
          Compress-Archive -Path "output\Auction Bid Server" -DestinationPath "Auction-Bid-Server-1.0.0-Portable.zip"

      - name: 4. Build & Package JavaFX (Auction Bid System)
        working-directory: auctionsystemdemo
        run: |
          Write-Host "=== DANG BUILD CLIENT BANG MAVEN ==="
          mvn clean package dependency:copy-dependencies -DoutputDirectory=target/libs -DskipTests
          
          # Bắt lỗi Maven
          if ($LASTEXITCODE -ne 0) { 
              Write-Error "Loi: Maven khong the build JavaFX Client. Vui long xem log cua Maven phia tren!"
              exit $LASTEXITCODE 
          }
          
          Write-Host "=== DANH SACH FILE TRONG THU MUC TARGET (CLIENT JAVAFX) ==="
          Get-ChildItem -Path target
          
          # Tạo sẵn thư mục libs
          New-Item -ItemType Directory -Force -Path "build_exe\libs"
          
          # Tìm file .jar của Client JavaFX
          $appFile = Get-ChildItem -Path target | Where-Object { $_.Extension -eq ".jar" -and $_.Name -notmatch "plain" -and $_.Name -notmatch "original" } | Select-Object -First 1
          
          if ($null -eq $appFile) {
              Write-Error "Khong tim thay bat ky file .jar nao trong thu muc target!"
              exit 1
          }
          
          Write-Host "Da tim thay file: $($appFile.FullName)"
          
          # Gom tất cả thư viện VÀ file client.jar vào chung một thư mục 'libs'
          if (Test-Path "target\libs") { Copy-Item -Path "target\libs\*" -Destination "build_exe\libs" -Recurse }
          Copy-Item -Path $appFile.FullName -Destination "build_exe\libs\client.jar"
          
          Write-Host "=== TAO JRE TUY CHINH DE TRANH LOI AUTOMATIC MODULE ==="
          # Đã bổ sung java.scripting vào danh sách module
          jlink --add-modules java.base,java.desktop,java.sql,java.naming,java.management,java.net.http,java.xml,java.prefs,jdk.unsupported,jdk.unsupported.desktop,jdk.accessibility,jdk.crypto.ec,jdk.crypto.cryptoki,jdk.charsets,jdk.naming.dns,java.scripting --output custom_jre --no-header-files --no-man-pages
          
          Write-Host "=== DONG GOI APP BẢN 1.0.0 BANG JPACKAGE ==="
          jpackage --type app-image --dest output --name "Auction Bid System" --app-version 1.0.0 --runtime-image custom_jre --module-path "build_exe\libs" --module com.auction/com.auction.App --win-console
          
          # TẠO SCRIPT CHẠY NHANH
          $batContent = "@echo off`r`n`"Auction Bid System.exe`"`r`npause"
          Set-Content -Path "output\Auction Bid System\Run-Debug.bat" -Value $batContent -Encoding ASCII
          
          Compress-Archive -Path "output\Auction Bid System" -DestinationPath "Auction-Bid-System-1.0.0-Portable.zip"

      - name: 5. Upload Releases
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            AuctionBidSystemSpringBootRework/Auction-Bid-Server-1.0.0-Portable.zip
            auctionsystemdemo/Auction-Bid-System-1.0.0-Portable.zip
          tag_name: "v1.0.0.${{ github.run_number }}"
          name: "Auction Bid System Release v1.0.${{ github.run_number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

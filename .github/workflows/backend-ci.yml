name: Build Windows EXEs and Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-release:
    runs-on: windows-latest 
    permissions:
      contents: write 

    steps:
    - name: 1. Checkout code
      uses: actions/checkout@v4

    - name: 2. Setup Java 21 LTS
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: 3. Build & Package Spring Boot (Auction Bid Server)
      run: |
        cd AuctionBidSystemSpringBootRework
        mvn clean package -DskipTests
        
        New-Item -ItemType Directory -Force -Path build_exe
        
        # Trích xuất và đổi tên file JAR thành tên cố định (server.jar)
        $jarFile = Get-ChildItem -Path target\*.jar -Exclude *plain*,*original* | Select-Object -First 1
        Copy-Item -Path $jarFile.FullName -Destination "build_exe\server.jar"
        
        jpackage --type app-image --dest output --name "Auction Bid Server" --app-version 0.2.5 --input build_exe --main-jar server.jar --win-console
        
        $batContent = "@echo off`r`n`"Auction Bid Server.exe`"`r`npause"
        Set-Content -Path "output\Auction Bid Server\Run-Debug.bat" -Value $batContent -Encoding ASCII
        
        Compress-Archive -Path "output\Auction Bid Server" -DestinationPath "Auction-Bid-Server-0.2.5-Portable.zip"

    - name: 4. Build & Package JavaFX (Auction Bid System)
      run: |
        cd auctionsystemdemo 
        mvn clean package dependency:copy-dependencies -DoutputDirectory=target/libs -DskipTests
        
        New-Item -ItemType Directory -Force -Path build_exe
        
        # Trích xuất và đổi tên file JAR thành tên cố định (client.jar)
        $jarFile = Get-ChildItem -Path target\*.jar -Exclude *plain*,*original* | Select-Object -First 1
        Copy-Item -Path $jarFile.FullName -Destination "build_exe\client.jar"
        
        if (Test-Path "target\libs") { Copy-Item -Path "target\libs" -Destination build_exe -Recurse }
        
        jpackage --type app-image --dest output --name "Auction Bid System" --app-version 0.1.3 --module-path "build_exe\libs;build_exe\client.jar" --module com.auction/com.auction.App --win-console
        
        $batContent = "@echo off`r`n`"Auction Bid System.exe`"`r`npause"
        Set-Content -Path "output\Auction Bid System\Run-Debug.bat" -Value $batContent -Encoding ASCII
        
        Compress-Archive -Path "output\Auction Bid System" -DestinationPath "Auction-Bid-System-0.1.3-Portable.zip"

    - name: 5. Upload Releases
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          AuctionBidSystemSpringBootRework/Auction-Bid-Server-0.2.5-Portable.zip
          auctionsystemdemo/Auction-Bid-System-0.1.3-Portable.zip
        tag_name: "v2.0.${{ github.run_number }}"
        name: "Auction Bid System version 2.0.${{ github.run_number }}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build Windows EXEs and Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Setup Java 21 LTS
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: 3. Build & Package Spring Boot (Auction Bid Server)
        run: |
          cd AuctionBidSystemSpringBootRework
          
          Write-Host "=== DANG BUILD SERVER BENG MAVEN ==="
          mvn clean package -DskipTests
          
          # Bắt lỗi: Nếu lệnh mvn ở trên thất bại, dừng ngay lập tức
          if ($LASTEXITCODE -ne 0) { 
              Write-Error "Loi: Maven khong the build Server. Vui long xem log cua Maven phia tren!"
              exit $LASTEXITCODE 
          }
          
          Write-Host "=== DANH SACH FILE TRONG THU MUC TARGET (SERVER) ==="
          Get-ChildItem -Path target
          
          New-Item -ItemType Directory -Force -Path build_exe
          
          # Tìm file .jar hoặc .war
          $appFile = Get-ChildItem -Path target | Where-Object { ($_.Extension -eq ".jar" -or $_.Extension -eq ".war") -and $_.Name -notmatch "plain" -and $_.Name -notmatch "original" } | Select-Object -First 1
          
          if ($null -eq $appFile) {
              Write-Error "Khong tim thay bat ky file .jar hay .war nao trong thu muc target!"
              exit 1
          }
          
          Write-Host "Da tim thay file: $($appFile.FullName)"
          Copy-Item -Path $appFile.FullName -Destination "build_exe\server.jar"
          
          jpackage --type app-image --dest output --name "Auction Bid Server" --app-version 0.5.0 --input build_exe --main-jar server.jar --win-console
          
          $batContent = "@echo off`r`n`"Auction Bid Server.exe`"`r`npause"
          Set-Content -Path "output\Auction Bid Server\Run-Debug.bat" -Value $batContent -Encoding ASCII
          
          Compress-Archive -Path "output\Auction Bid Server" -DestinationPath "Auction-Bid-Server-0.5.0-Portable.zip"

      - name: 4. Build & Package JavaFX (Auction Bid System)
        run: |
          cd auctionsystemdemo 
          
          Write-Host "=== DANG BUILD CLIENT BENG MAVEN ==="
          mvn clean package dependency:copy-dependencies -DoutputDirectory=target/libs -DskipTests
          
          # Bắt lỗi: Nếu lệnh mvn ở trên thất bại, dừng ngay lập tức
          if ($LASTEXITCODE -ne 0) { 
              Write-Error "Loi: Maven khong the build JavaFX Client. Vui long xem log cua Maven phia tren!"
              exit $LASTEXITCODE 
          }
          
          Write-Host "=== DANH SACH FILE TRONG THU MUC TARGET (CLIENT JAVAFX) ==="
          Get-ChildItem -Path target
          
          New-Item -ItemType Directory -Force -Path build_exe
          
          # Tìm file .jar của JavaFX
          $appFile = Get-ChildItem -Path target | Where-Object { $_.Extension -eq ".jar" -and $_.Name -notmatch "plain" -and $_.Name -notmatch "original" } | Select-Object -First 1
          
          if ($null -eq $appFile) {
              Write-Error "Khong tim thay bat ky file .jar nao trong thu muc target!"
              exit 1
          }
          
          Write-Host "Da tim thay file: $($appFile.FullName)"
          Copy-Item -Path $appFile.FullName -Destination "build_exe\client.jar"
          
          if (Test-Path "target\libs") { Copy-Item -Path "target\libs" -Destination build_exe -Recurse }
          
          jpackage --type app-image --dest output --name "Auction Bid System" --app-version 0.5.0 --module-path "build_exe\libs;build_exe\client.jar" --module com.auction/com.auction.App --add-modules jdk.naming.dns,jdk.crypto.ec,jdk.crypto.cryptoki,jdk.charsets,java.net.http --win-console
          
          $batContent = "@echo off`r`n`"Auction Bid System.exe`"`r`npause"
          Set-Content -Path "output\Auction Bid System\Run-Debug.bat" -Value $batContent -Encoding ASCII
          
          Compress-Archive -Path "output\Auction Bid System" -DestinationPath "Auction-Bid-System-0.5.0-Portable.zip"

      - name: 5. Upload Releases
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            AuctionBidSystemSpringBootRework/Auction-Bid-Server-0.5.0-Portable.zip
            auctionsystemdemo/Auction-Bid-System-0.5.0-Portable.zip
          tag_name: "v0.5.0.${{ github.run_number }}"
          name: "Auction Bid System version 2.0.${{ github.run_number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
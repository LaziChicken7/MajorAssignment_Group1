name: Build Fat JARs and Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Setup Java 21 LTS
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: 3. Build & Extract Server JAR
        working-directory: AuctionBidSystemSpringBootRework
        run: |
          echo "=== DANG BUILD SERVER BANG MAVEN ==="
          mvn clean package -DskipTests
          
          echo "=== TIM VA DOI TEN THANH server.jar ==="
          JAR_FILE=$(find target -maxdepth 1 -name "*.jar" ! -name "*plain*" ! -name "*original*" | head -n 1)
          
          if [ -z "$JAR_FILE" ]; then
            echo "Loi: Khong tim thay file JAR cua Server!"
            exit 1
          fi
          
          # Đổi tên file thành server.jar (không chứa version)
          cp "$JAR_FILE" server.jar

      - name: 4. Build & Extract Client JAR
        working-directory: auctionsystemdemo
        run: |
          echo "=== DANG BUILD CLIENT BANG MAVEN ==="
          mvn clean package -DskipTests
          
          echo "=== TIM VA DOI TEN THANH client.jar ==="
          JAR_FILE=$(find target -maxdepth 1 -name "*.jar" ! -name "*original*" | head -n 1)
          
          if [ -z "$JAR_FILE" ]; then
            echo "Loi: Khong tim thay file JAR cua Client!"
            exit 1
          fi
          
          # Đổi tên file thành client.jar (không chứa version)
          cp "$JAR_FILE" client.jar

      - name: 5. Upload Releases
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          # Chỉ định đúng 2 file đã được đổi tên để upload
          files: |
            AuctionBidSystemSpringBootRework/server.jar
            auctionsystemdemo/client.jar
          tag_name: "latest-build-${{ github.run_number }}"
          name: "Auto Build #${{ github.run_number }}"
          body: |
            **Hướng dẫn chạy chương trình (Nộp bài tập lớn LTNC)**
            
            1. Tải 2 file `server.jar` và `client.jar` ở mục **Assets** bên dưới.
            2. Mở terminal, chạy Server trước:
            ```bash
            java -jar server.jar
            ```
            3. Mở terminal khác, chạy Client:
            ```bash
            java -jar client.jar
            ```
            *(Để mở nhiều client, chỉ cần chạy lại lệnh chạy client ở nhiều terminal khác nhau).*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
name: Spring Boot CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest 

    # ============================================================
    # CHỈ ĐƯỜNG CHO ROBOT: Mọi lệnh run phải chui vào thư mục này
    # ============================================================
    defaults:
      run:
        working-directory: ./AuctionBidSystemSpringBootRework

    # Giả lập Database
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: AuctionBidSystemTest
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
    - name: 1. Lấy code từ GitHub về máy ảo
      uses: actions/checkout@v4

    - name: 2. Cài đặt Java 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: 3. Chạy Đóng gói (Package)
      run: mvn clean package

    - name: 4. Chạy JUnit Test
      run: mvn test

    - name: 5. Lưu trữ file JAR (Artifact) để tải về
      if: success() 
      uses: actions/upload-artifact@v4
      with:
        name: auction-backend-jar
        # Chú ý đường dẫn lấy file JAR cũng phải thêm thư mục con vào
        path: AuctionBidSystemSpringBootRework/target/*.jar
        
  # ============================================================
  # PHẦN CD: TỰ ĐỘNG CHUYỂN GIAO (DELIVERY) LÊN MỤC RELEASES
  # ============================================================
  delivery:
    name: CD - Tự động tạo bản Release
    needs: build-and-test 
    runs-on: ubuntu-latest
    # Khi có code đẩy lên main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    # cấp quyên write
    permissions:
      contents: write 

    steps:
      - name: 6. Tải file JAR vừa được CI đóng gói xuống
        uses: actions/download-artifact@v4
        with:
          name: auction-backend-jar 
          path: ./release-files # thư mục tạm để chứa file tải về
          
      - name: 7. Đẩy file lên mục Releases của GitHub
        uses: softprops/action-gh-release@v1
        with:
          files: ./release-files/*.jar
          tag_name: "v1.0.${{ github.run_number }}"
          name: "Phiên bản tự động v1.0.${{ github.run_number }}"
          body: "Continuous Delivery."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

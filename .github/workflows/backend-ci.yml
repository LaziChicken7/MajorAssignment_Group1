name: Build Windows EXEs and Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-release:
    # BẮT BUỘC CHẠY TRÊN WINDOWS ĐỂ TẠO FILE .EXE
    runs-on: windows-latest 
    permissions:
      contents: write 

    steps:
    - name: 1. Lấy code từ GitHub
      uses: actions/checkout@v4

    - name: 2. Cài đặt Java 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: 3. Build & Đóng gói Spring Boot (Auction Bid Server)
      run: |
        cd AuctionBidSystemSpringBootRework
        # Bỏ qua Test để không cần kết nối MySQL giả lập khi Build
        mvn clean package -DskipTests
        
        # Tìm file Jar chính
        $mainJarFile = Get-ChildItem -Path target -Filter "*.jar" | Where-Object { $_.Name -notmatch "plain" -and $_.Name -notmatch "original" } | Select-Object -First 1 | Select-Object -ExpandProperty Name
        
        # Đưa vào thư mục tạm
        New-Item -ItemType Directory -Force -Path build_exe
        Copy-Item -Path "target\$mainJarFile" -Destination build_exe\
        
        # Dùng JPackage tạo thư mục app-image (chạy trực tiếp không cần cài)
        jpackage --type app-image --dest output --name "Auction Bid Server" --app-version 0.2.5 --input build_exe --main-jar $mainJarFile --win-console
        
        # Nén thư mục thành file ZIP Portable
        Compress-Archive -Path "output\Auction Bid Server" -DestinationPath "Auction-Bid-Server-0.2.5-Portable.zip"

    - name: 4. Build & Đóng gói JavaFX (Auction Bid System)
      run: |
        cd auctionsystemdemo 
        
        # Build và lấy toàn bộ thư viện phụ thuộc (lib)
        mvn clean package dependency:copy-dependencies -DoutputDirectory=target/libs -DskipTests
        
        # Tìm file Jar chính
        $mainJarFile = Get-ChildItem -Path target -Filter "*.jar" | Where-Object { $_.Name -notmatch "original" } | Select-Object -First 1 | Select-Object -ExpandProperty Name
        
        # Đưa file Jar chính và các thư viện vào thư mục tạm
        New-Item -ItemType Directory -Force -Path build_exe
        Copy-Item -Path "target\$mainJarFile" -Destination build_exe\
        if (Test-Path "target\libs") { Copy-Item -Path "target\libs\*" -Destination build_exe\ }
        
        # Dùng JPackage tạo thư mục app-image (chỉ định rõ main-class)
        jpackage --type app-image --dest output --name "Auction Bid System" --app-version 0.1.3 --input build_exe --main-jar $mainJarFile --main-class com.auction.App
        
        # Nén thư mục thành file ZIP Portable
        Compress-Archive -Path "output\Auction Bid System" -DestinationPath "Auction-Bid-System-0.1.3-Portable.zip"

    - name: 5. Đẩy 2 file Portable (ZIP) lên mục Releases của GitHub
      # Chỉ đẩy lên Release nếu đây là sự kiện PUSH vào nhánh main
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          AuctionBidSystemSpringBootRework/Auction-Bid-Server-0.2.5-Portable.zip
          auctionsystemdemo/Auction-Bid-System-0.1.3-Portable.zip
        tag_name: "v2.0.${{ github.run_number }}"
        name: "Auction Bid System version 2.0.${{ github.run_number }}"
        body: |
          **Bản cập nhật tự động (Continuous Delivery).**
          
          📦 **Bao gồm 2 bản Portable (Tải về, giải nén và mở file .exe chạy luôn):**
          - `Auction-Bid-Server-0.2.5-Portable.zip`: Dành cho máy chủ Backend (Mở app sẽ có màn hình đen ghi log kết nối CSDL).
          - `Auction-Bid-System-0.1.3-Portable.zip`: App Giao diện JavaFX cho khách hàng (Đã nhúng sẵn Java, chạy độc lập).
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
